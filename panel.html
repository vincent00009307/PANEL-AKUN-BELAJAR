<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Server Manager - Akun Belajar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --accent: #0d6efd; }
        body { background-color: var(--bs-body-bg); font-family: 'Inter', sans-serif; transition: 0.3s; }
        .glass-card { border-radius: 15px; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .sidebar-log { height: 300px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; background: #212529; color: #00ff00; padding: 15px; border-radius: 10px; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d6efd; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-overlay">
    <div class="card p-4 animate__animated animate__fadeInDown" style="width: 350px;">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
            <h4>LOGIN</h4>
        </div>
        <input type="password" id="adminPass" class="form-control mb-3" placeholder="Masukkan Password Admin">
        <button onclick="checkLogin()" class="btn btn-primary w-100">ENTER</button>
        <p class="text-center mt-2 small text-muted text-uppercase">Hint: admin123</p>
    </div>
</div>

<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-md-6">
            <h2 class="fw-bold mb-0">System Control Center</h2>
            <div id="clock" class="text-muted small"></div>
        </div>
        <div class="col-md-6 text-end">
            <button class="btn btn-dark btn-sm me-2" onclick="toggleDarkMode()"><i class="bi bi-moon"></i></button>
            <button class="btn btn-danger btn-sm" onclick="location.reload()"><i class="bi bi-power"></i> Logout</button>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-4">
            <div class="card glass-card p-4 mb-4 animate__animated animate__fadeInLeft">
                <h5><i class="bi bi-plus-circle"></i> Registrasi Akun</h5>
                <hr>
                <form id="accountForm">
                    <div class="mb-3">
                        <label class="form-label small">Email Belajar.id</label>
                        <input type="email" id="userEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Role Pengguna</label>
                        <select id="userRole" class="form-select">
                            <option value="Siswa">Siswa</option>
                            <option value="Guru">Guru</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-2">Simpan ke Database</button>
                </form>
            </div>

            <div class="card glass-card p-3 mb-4 animate__animated animate__fadeInLeft" style="animation-delay: 0.2s;">
                <h6>Statistik Role</h6>
                <canvas id="roleChart" width="100" height="100"></canvas>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card glass-card p-4 mb-4 animate__animated animate__fadeInUp">
                <div class="d-flex justify-content-between mb-3">
                    <h5><i class="bi bi-hdd-network"></i> Database Terkoneksi</h5>
                    <div class="d-flex gap-2">
                        <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Cari..." onkeyup="searchTable()">
                        <button class="btn btn-sm btn-outline-success" onclick="downloadCSV()"><i class="bi bi-filetype-csv"></i></button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th width="10"><input type="checkbox" id="selectAll"></th>
                                <th>Akun</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Opsi</th>
                            </tr>
                        </thead>
                        <tbody id="userTable"></tbody>
                    </table>
                </div>
                <button class="btn btn-sm btn-outline-danger mt-2" onclick="bulkDelete()"><i class="bi bi-trash"></i> Hapus yang Tercentang</button>
            </div>

            <div class="card glass-card p-3 animate__animated animate__fadeInUp" style="animation-delay: 0.3s;">
                <h6><i class="bi bi-terminal"></i> Server Activity Log</h6>
                <div id="logConsole" class="sidebar-log">
                    [SYSTEM] Terminal Ready...<br>
                    [SYSTEM] Local Database Connected...<br>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let accounts = JSON.parse(localStorage.getItem('ultra_accounts')) || [];
    let myChart;

    // LOGIN CHECK
    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "admin123") {
            document.getElementById('loginScreen').classList.add('animate__animated', 'animate__fadeOut');
            setTimeout(() => document.getElementById('loginScreen').style.display = 'none', 500);
            initSystem();
        } else {
            alert("Password Salah!");
        }
    }

    function initSystem() {
        renderTable();
        updateChart();
        addLog("Admin logged in successfully");
    }

    // UPDATE TIME
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleString('id-ID');
    }, 1000);

    // CORE FUNCTIONS
    document.getElementById('accountForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('userEmail').value;
        const role = document.getElementById('userRole').value;
        
        accounts.push({ id: Date.now(), email, role, status: 'Active' });
        addLog(`Account Added: ${email} (${role})`);
        saveData();
        this.reset();
    });

    function saveData() {
        localStorage.setItem('ultra_accounts', JSON.stringify(accounts));
        renderTable();
        updateChart();
    }

    function renderTable(data = accounts) {
        const table = document.getElementById('userTable');
        table.innerHTML = data.map(acc => `
            <tr class="animate__animated animate__fadeIn">
                <td><input type="checkbox" class="user-check" data-id="${acc.id}"></td>
                <td><strong>${acc.email}</strong></td>
                <td><span class="badge ${acc.role === 'Siswa' ? 'bg-info' : 'bg-warning'}">${acc.role}</span></td>
                <td><span class="text-success small"><i class="bi bi-record-fill"></i> Online</span></td>
                <td>
                    <button class="btn btn-sm btn-link text-danger" onclick="deleteAcc(${acc.id})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function addLog(msg) {
        const log = document.getElementById('logConsole');
        log.innerHTML += `[${new Date().toLocaleTimeString()}] > ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    // CHART.JS INTEGRATION
    function updateChart() {
        const ctx = document.getElementById('roleChart').getContext('2d');
        const siswaCount = accounts.filter(a => a.role === 'Siswa').length;
        const guruCount = accounts.filter(a => a.role === 'Guru').length;

        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Siswa', 'Guru'],
                datasets: [{
                    data: [siswaCount, guruCount],
                    backgroundColor: ['#0dcaf0', '#ffc107']
                }]
            },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    // BULK DELETE
    function bulkDelete() {
        const checked = document.querySelectorAll('.user-check:checked');
        if(checked.length === 0) return alert("Pilih akun dulu!");
        if(confirm(`Hapus ${checked.length} akun terpilih?`)) {
            const idsToDelete = Array.from(checked).map(c => parseInt(c.dataset.id));
            accounts = accounts.filter(a => !idsToDelete.includes(a.id));
            addLog(`Bulk Delete: ${checked.length} records removed`);
            saveData();
        }
    }

    function deleteAcc(id) {
        accounts = accounts.filter(a => a.id !== id);
        addLog(`Account ID ${id} deleted`);
        saveData();
    }

    function toggleDarkMode() {
        const current = document.documentElement.getAttribute('data-bs-theme');
        document.documentElement.setAttribute('data-bs-theme', current === 'dark' ? 'light' : 'dark');
        addLog(`System Theme changed to ${current === 'dark' ? 'Light' : 'Dark'}`);
    }

    function searchTable() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = accounts.filter(a => a.email.toLowerCase().includes(val));
        renderTable(filtered);
    }
</script>
</body>
</html>
